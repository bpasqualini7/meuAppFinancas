<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InvestHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0a0e1a; --bg2: #111827; --bg3: #1e2433; --bg4: #252d3d;
        --bd: #2a3347; --tx: #e2e8f0; --tx2: #94a3b8; --tx3: #64748b;
        --ac: #3b82f6; --ac2: #6366f1; --gr: #22c55e; --rd: #ef4444; --am: #f59e0b;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: var(--bg); color: var(--tx); font-family: 'DM Sans', system-ui, sans-serif; font-size: 14px; overflow-x: hidden; }
      html { overflow-x: hidden; }
      input, select, button, textarea { font-family: inherit; }
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: var(--bg2); }
      ::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 3px; }

      /* ── Mobile responsive ── */
      @media (max-width: 768px) {
        .sidebar { width: 100% !important; height: auto !important; position: relative !important; flex-direction: row !important; flex-wrap: wrap; }
        .main-content { margin-left: 0 !important; padding: 16px !important; }
        .nav-label { display: none !important; }
        table { font-size: 11px !important; }
        th, td { padding: 6px 8px !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
